name: Rust Build and Release (Windows)

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: version
        run: echo "::{name}={$((Get-Content -Path .\Cargo.toml | Select-Object -Index 2) -replace '[^0-9.]')}" >> $GITHUB_OUTPUT
        id: version

      - name: create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
