name: Rust Build and Release (Windows)

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: version
        run: echo "version=$((Get-Content -Path .\Cargo.toml | Select-Object -Index 2) -replace '[^0-9.]')" >> $ENV:GITHUB_OUTPUT
        id: version

      - name: body
        run: echo "body="(git log --oneline | where { $_ -like "*feat*"-or $_ -like "*fix*" }) >> $ENV:GITHUB_OUTPUT
        id: body

      - name: create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: ${{ steps.version.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          draft: true
          prerelease: false
