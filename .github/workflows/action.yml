name: Rust Build and Release (Windows)

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Version
        run: (Get-Content -Path .\Cargo.toml | Select-Object -Index 2) -replace '[^0-9.]'
        id: version

      - name: Output Version
        run: echo "${{ steps.nodejs.outputs.version }}"
        id: version
